name: Test

on:
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Type check
        run: pnpm run test:typescript

      - name: Run tests
        run: pnpm run test:coverage

      - name: Check generated docs
        run: pnpm run check:generated

  # Bookend openai majors within peer range openai >=4 <7 (version-coupling signal).
  test-openai-peer-range:
    name: openai ${{ matrix.openai-version }} · Node 22
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        openai-version: ['4.104.0', '5.23.2', '6.33.0']
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Pin openai devDependency for this matrix cell
        run: pnpm add -D openai@${{ matrix.openai-version }} --no-frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Type check
        run: pnpm run test:typescript

      - name: Run tests
        run: pnpm run test:coverage

      - name: Check generated docs
        run: pnpm run check:generated

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint
